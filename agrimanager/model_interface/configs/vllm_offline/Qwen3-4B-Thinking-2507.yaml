# vLLM Offline Configuration - Qwen3-4B-Thinking-2507
# NOTE: This model always thinks (hardcoded in chat template).
#       reasoning_effort has no effect on Qwen3 Thinking models.
model_provider: "vllm_offline"
model_name: "Qwen/Qwen3-4B-Thinking-2507"

# vLLM Offline-specific parameters
tensor_parallel_size: 1  # Number of GPUs for tensor parallelism
gpu_memory_utilization: 0.95  # GPU memory utilization (0.0 to 1.0)
trust_remote_code: true  # Whether to trust remote code in model repo
dtype: "auto"  # Data type: "auto", "float16", "bfloat16", "float32"
tokenizer_mode: "auto"  # Tokenizer mode: "auto", "slow"
max_model_len: 30000  # Maximum sequence length (null for model default)

extract_reasoning: true  # Extract <think> blocks from output
