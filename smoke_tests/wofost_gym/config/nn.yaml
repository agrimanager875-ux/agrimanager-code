env_name: wofost_gym
dataset_id: wofost_gym_smoke_nn

source:
  kind: weather_pool
  path: agrimanager/wofost-weather-pool

sampling:
  generation_seed: 42
  splits:
    train:
      crops: [wheat]
      num_samples: 32
    val:
      crops: [wheat]
      num_samples: 8
    test:
      crops: [wheat]
      num_samples: 8

env:
  env_id: lnpkw-v0
  wofost_gym_path: ../AgriManagerExternal/WOFOSTGym
  llm_mode: false
  intvn_interval: 10
  turn_num: 24
  scale_action_amounts_by_interval: true
  objective_id: profit_max
  include_crop_traits: true
  crop_traits_dir: agrimanager/env/wofost_gym/crop_traits
  trait_schema: traits_v1_23d
