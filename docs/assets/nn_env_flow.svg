<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#444"/>
    </marker>
  </defs>

  <text x="20" y="30" font-size="17" font-weight="600" fill="#222">Base NN path: parquet-driven numeric training and eval</text>
  <text x="20" y="52" font-size="13" fill="#666">The trainer is generic. Env-specific numeric behavior lives behind BaseNNEnvAdapter.</text>

  <rect x="20" y="68" width="14" height="12" rx="2" fill="#f2f2f2" stroke="#999" stroke-width="1"/>
  <text x="40" y="78" font-size="11" fill="#555">framework</text>
  <rect x="116" y="68" width="14" height="12" rx="2" fill="#eaf5ea" stroke="#4a9450" stroke-width="1"/>
  <text x="136" y="78" font-size="11" fill="#555">env adapter code</text>
  <rect x="270" y="68" width="14" height="12" rx="2" fill="#fff5cf" stroke="#c9a227" stroke-width="1"/>
  <text x="290" y="78" font-size="11" fill="#555">parquet contract</text>
  <rect x="420" y="68" width="14" height="12" rx="2" fill="#eaf0ff" stroke="#5f76b7" stroke-width="1"/>
  <text x="440" y="78" font-size="11" fill="#555">model artifacts</text>

  <text x="20" y="112" font-size="11" font-weight="700" fill="#888" letter-spacing="2">DATASET OWNERS ENV CONFIG</text>

  <rect x="60" y="124" width="420" height="50" rx="6" fill="#f2f2f2" stroke="#999" stroke-width="1.3"/>
  <text x="270" y="146" font-size="13" font-weight="600" text-anchor="middle" fill="#222">dataset config YAML</text>
  <text x="270" y="163" font-size="11" text-anchor="middle" fill="#555">env_name + all environment semantics</text>

  <line x1="270" y1="174" x2="270" y2="198" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="200" width="420" height="56" rx="6" fill="#fff5cf" stroke="#c9a227" stroke-width="2"/>
  <text x="270" y="222" font-size="14" font-weight="700" text-anchor="middle" fill="#222">train.parquet / val.parquet / test.parquet</text>
  <text x="270" y="241" font-size="11" text-anchor="middle" font-family="ui-monospace, monospace" fill="#333">env_config = {env_name, simulator paths, rewards, actions, ...}</text>

  <rect x="520" y="124" width="340" height="132" rx="6" fill="#fafafa" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="690" y="146" font-size="12" font-weight="600" text-anchor="middle" fill="#333">rule</text>
  <text x="540" y="172" font-size="11" fill="#555">Training and eval commands choose runtime settings:</text>
  <text x="552" y="194" font-size="11" font-family="ui-monospace, monospace" fill="#222">runtime.train_epochs</text>
  <text x="552" y="214" font-size="11" font-family="ui-monospace, monospace" fill="#222">runtime.resume.mode</text>
  <text x="552" y="234" font-size="11" font-family="ui-monospace, monospace" fill="#222">agent hyperparameters / output paths</text>
  <text x="540" y="250" font-size="10" fill="#888">They do not override environment semantics.</text>

  <line x1="270" y1="256" x2="270" y2="292" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <text x="20" y="286" font-size="11" font-weight="700" fill="#888" letter-spacing="2">TRAIN</text>

  <rect x="60" y="296" width="420" height="48" rx="6" fill="#f2f2f2" stroke="#999" stroke-width="1.3"/>
  <text x="270" y="316" font-size="13" text-anchor="middle" font-family="ui-monospace, monospace" fill="#222">entrypoints/train/nn_train.sh</text>
  <text x="270" y="333" font-size="11" text-anchor="middle" fill="#555">launches agrimanager.nn_ppo.train</text>

  <line x1="270" y1="344" x2="270" y2="366" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="368" width="420" height="58" rx="6" fill="#f2f2f2" stroke="#999" stroke-width="1.3"/>
  <text x="270" y="390" font-size="13" font-weight="600" text-anchor="middle" fill="#222">generic NN trainer</text>
  <text x="270" y="408" font-size="11" text-anchor="middle" fill="#555">loads env_configs from parquet and infers env_name</text>

  <line x1="270" y1="426" x2="270" y2="448" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="450" width="420" height="58" rx="6" fill="#eaf5ea" stroke="#4a9450" stroke-width="1.5"/>
  <text x="270" y="472" font-size="13" font-weight="600" text-anchor="middle" fill="#222">&lt;Env&gt;NNEnvAdapter</text>
  <text x="270" y="490" font-size="11" text-anchor="middle" fill="#555">discovered from agrimanager.env.&lt;env_name&gt;.nn_adapter</text>

  <rect x="520" y="368" width="340" height="140" rx="6" fill="#fafafa" stroke="#bbb" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="690" y="390" font-size="12" font-weight="600" text-anchor="middle" fill="#333">interface: BaseNNEnvAdapter</text>
  <text x="540" y="416" font-size="11" font-family="ui-monospace, monospace" fill="#222">make_env(env_config) -&gt; gym.Env</text>
  <text x="540" y="438" font-size="11" font-family="ui-monospace, monospace" fill="#222">episode_length_hint(env_config)</text>
  <text x="540" y="460" font-size="11" font-family="ui-monospace, monospace" fill="#222">group_labels(env_config, info)</text>
  <text x="540" y="482" font-size="11" font-family="ui-monospace, monospace" fill="#222">serialize_action(action)</text>
  <text x="540" y="500" font-size="10" fill="#888">No crop-specific or env_name branches in the trainer.</text>

  <line x1="270" y1="508" x2="270" y2="532" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="534" width="420" height="58" rx="6" fill="#eaf5ea" stroke="#4a9450" stroke-width="1.5"/>
  <text x="270" y="556" font-size="13" font-weight="600" text-anchor="middle" fill="#222">Gymnasium numeric env</text>
  <text x="270" y="574" font-size="11" text-anchor="middle" fill="#555">observation_space, action_space, reset(), step(), close()</text>

  <line x1="270" y1="592" x2="270" y2="616" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="60" y="618" width="420" height="58" rx="6" fill="#f2f2f2" stroke="#999" stroke-width="1.3"/>
  <text x="270" y="640" font-size="13" font-weight="600" text-anchor="middle" fill="#222">SB3 PPO backend</text>
  <text x="270" y="658" font-size="11" text-anchor="middle" fill="#555">epoch budget, validation, generic trajectory metrics</text>

  <line x1="480" y1="647" x2="552" y2="647" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <rect x="560" y="590" width="300" height="86" rx="6" fill="#eaf0ff" stroke="#5f76b7" stroke-width="1.5"/>
  <text x="710" y="614" font-size="13" font-weight="600" text-anchor="middle" fill="#222">resumable artifacts</text>
  <text x="584" y="638" font-size="11" font-family="ui-monospace, monospace" fill="#222">agent.zip · vecnormalize.pkl</text>
  <text x="584" y="658" font-size="11" font-family="ui-monospace, monospace" fill="#222">trainer_state.json · config.yaml</text>

  <text x="20" y="704" font-size="11" font-weight="700" fill="#888" letter-spacing="2">EVAL REUSES THE SAME CONTRACT</text>
  <line x1="710" y1="590" x2="710" y2="540" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="724" y="558" font-size="11" fill="#555">nn_eval.sh loads agent.zip and</text>
  <text x="724" y="574" font-size="11" fill="#555">rebuilds envs through the adapter</text>
</svg>
