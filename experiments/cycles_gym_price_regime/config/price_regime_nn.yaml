env_name: cycles_gym
dataset_id: cycles_gym_price_regime_nn

base_config:
  cycles_gym_path: ../AgriManagerExternal/CyclesGym
  llm_mode: false
  reward_scale: 1000.0
  reward_params:
    crop_planning_same_crop_penalty: 0.05
    crop_planning_same_crop_penalty_cap: 0.4
    crop_planning_cereal_run_penalty: 0.02
    crop_planning_legume_break_bonus: 0.03
    crop_planning_cereal_after_legume_bonus: 0.02
    crop_planning_change_crop_bonus: 0.01
  turn_num: 19
  env_kwargs:
    rotation_crops:
      - CornRM.100
      - SoybeanMG.3
    crop_price_sampling:
      CornRM.100:
        min: 220.0
        mode: 250.0
        max: 280.0
      SoybeanMG.3:
        min: 260.0
        mode: 300.0
        max: 340.0

train_generation:
  env_ids:
    - CropPlanningRockSpringsRW-v1
    - CropPlanningNewHollandRW-v1
  year_windows:
    - [1980, 1998]
    - [1981, 1999]
    - [1982, 2000]
    - [1983, 2001]
  seeds_per_combo: 200
  seed_start: 0

val_generation:
  env_ids:
    - CropPlanningRockSpringsRW-v1
    - CropPlanningNewHollandRW-v1
  year_windows:
    - [1986, 2004]
    - [1987, 2005]
    - [1988, 2006]
    - [1989, 2007]
  seeds_per_combo: 16
  seed_start: 200000
  paired_price_regimes:
    regimes:
      id_test:
        metadata:
          regime_family: id
      high_corn:
        crop_price_sampling_overrides:
          CornRM.100:
            min: 380.0
            mode: 430.0
            max: 480.0
        metadata:
          regime_family: ood
          shocked_crop: CornRM.100
      high_soybean:
        crop_price_sampling_overrides:
          SoybeanMG.3:
            min: 420.0
            mode: 470.0
            max: 520.0
        metadata:
          regime_family: ood
          shocked_crop: SoybeanMG.3
