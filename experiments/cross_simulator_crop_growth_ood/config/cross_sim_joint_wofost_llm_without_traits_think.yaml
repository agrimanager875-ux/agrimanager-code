env_name: wofost_gym
dataset_id: cross_sim_joint_wofost_llm_without_traits_think
source:
  kind: weather_pool
  path: agrimanager/wofost-weather-pool
sampling:
  generation_seed: 42
  splits:
    train:
      crops: [maize]
      num_samples: 534
    val:
      crops: [maize]
      num_samples: 128
    test:
      crops: [maize]
      num_samples: 128
env:
  env_id: lnw-v0
  wofost_gym_path: ../AgriManagerExternal/WOFOSTGym
  llm_mode: true
  intvn_interval: 10
  turn_num: 24
  scale_action_amounts_by_interval: true
  objective_id: profit_max
  include_crop_traits: false
  include_variety_traits: false
  require_think: true
  thinking_mode: think
  think_tag: tool_call
