env_name: gym_dssat
dataset_id: weather_rice_llm_think

env_id: rice-all-v0
save_folder: /tmp/dssat_configs/
llm_mode: true
turn_num: 200
decision_interval: 10
require_think: true
thinking_mode: grounding_decision
think_tag: think

env_params:
  mode: all
  cultivar: rice
  random_weather: true

train_seeds:
  count: 3200
  base_seed: 271000
val_seeds:
  count: 128
  base_seed: 275000
test_seeds:
  count: 512
  base_seed: 276000

soil_variation:
  enabled: false
