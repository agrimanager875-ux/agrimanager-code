env_name: gym_dssat
dataset_id: weather_maize_llm_think

env_id: maize-irrigation-v0
save_folder: /tmp/dssat_configs/
llm_mode: true
turn_num: 200
decision_interval: 10
require_think: true
thinking_mode: grounding_decision
think_tag: think

env_params:
  mode: all
  cultivar: maize
  random_weather: true

train_seeds:
  count: 3200
  base_seed: 171000
val_seeds:
  count: 128
  base_seed: 175000
test_seeds:
  count: 512
  base_seed: 176000

soil_variation:
  enabled: false
