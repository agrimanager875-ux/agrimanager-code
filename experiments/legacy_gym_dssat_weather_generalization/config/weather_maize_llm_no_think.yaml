env_name: gym_dssat
dataset_id: weather_maize_llm_no_think

env_id: maize-irrigation-v0
save_folder: /tmp/dssat_configs/
llm_mode: true
turn_num: 200
decision_interval: 10
require_think: false

env_params:
  mode: all
  cultivar: maize
  random_weather: true

train_seeds:
  count: 3200
  base_seed: 181000
val_seeds:
  count: 128
  base_seed: 185000
test_seeds:
  count: 512
  base_seed: 186000

soil_variation:
  enabled: false
