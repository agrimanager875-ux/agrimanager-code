train_configs:
  - <<: *rocksprings_train
    seed: 0
  - <<: *rocksprings_train
    seed: 1
  - <<: *rocksprings_train
    seed: 2
  - <<: *rocksprings_train
    seed: 3
  - <<: *rocksprings_new_years
    seed: 10
  - <<: *rocksprings_new_years
    seed: 11
  - <<: *rocksprings_new_years
    seed: 12
  - <<: *rocksprings_new_years
    seed: 13
  - <<: *newholland_train
    seed: 20
  - <<: *newholland_train
    seed: 21
  - <<: *newholland_train
    seed: 22
  - <<: *newholland_train
    seed: 23
  - <<: *newholland_long
    seed: 30
  - <<: *newholland_long
    seed: 31
  - <<: *newholland_long
    seed: 32
  - <<: *newholland_long
    seed: 33

val_configs:
  - <<: *rocksprings_train
    seed: 90
  - <<: *rocksprings_new_years
    seed: 91
  - <<: *newholland_train
    seed: 92
  - <<: *newholland_long
    seed: 93

test_configs:
